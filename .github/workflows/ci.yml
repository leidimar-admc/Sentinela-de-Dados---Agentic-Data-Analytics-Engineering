name: ci

on: [push, pull_request]

jobs:
  build-and-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -r requirements.txt
      - name: Lint
        run: ruff check .
      - name: Gerar dados simulados (deterministico)
        run: python data/generators/generate_mar.py
      - name: Build do data product (dbt: modelos + testes + contrato)
        run: cd transform && dbt build --profiles-dir .
      - name: Testes unitarios
        run: pytest -q
      - name: Evals dos agentes (gate de regressao)
        run: python evals/run_evals.py --check
